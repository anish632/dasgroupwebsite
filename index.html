<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Das Group</title>
    <meta name="description" content="Das Group support contact.">
    <link rel="canonical" href="https://dasgroupllc.com/">
    <meta name="robots" content="index, follow">
    <meta property="og:title" content="Das Group">
    <meta property="og:description" content="Das Group support contact.">
    <meta property="og:url" content="https://dasgroupllc.com/">
    <meta property="og:type" content="website">
    <style>
        :root {
            color-scheme: light;
            --bg: #f7f7f5;
            --fg: #111111;
            --muted: #4b4b47;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            background: var(--bg);
            color: var(--fg);
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        }

        main {
            display: grid;
            gap: 16px;
            text-align: center;
        }

        .wordmark {
            margin: 0;
            font-size: clamp(2.75rem, 8vw, 5.5rem);
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .support {
            color: var(--muted);
            font-size: clamp(1rem, 2.2vw, 1.25rem);
            text-decoration: none;
        }

        .support:hover,
        .support:focus-visible {
            color: var(--fg);
        }
    </style>
</head>
<body>
    <main>
        <h1 class="wordmark">Das Group</h1>
        <a class="support" href="mailto:support@dasgroupllc.com">support@dasgroupllc.com</a>
    </main>
</body>
</html>
