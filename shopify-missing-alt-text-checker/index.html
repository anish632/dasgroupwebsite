<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>How to Find Shopify Products with Missing Alt Text | BulkGenie AI</title>
    <meta name="description" content="Step-by-step guide to finding missing image alt text across your Shopify product catalog. Includes the CSV export method, sample output table, and how to fix alt text in bulk.">
    <link rel="canonical" href="https://dasgroupllc.com/shopify-missing-alt-text-checker/">
    <meta name="robots" content="index, follow">
    <meta property="og:title" content="How to Find Shopify Products with Missing Alt Text | BulkGenie AI">
    <meta property="og:description" content="Find every Shopify product image missing alt text using the CSV export method. Includes a sample output table and bulk fix workflow.">
    <meta property="og:url" content="https://dasgroupllc.com/shopify-missing-alt-text-checker/">
    <meta property="og:type" content="article">
    <meta property="og:site_name" content="Das Group LLC">
    <meta name="twitter:card" content="summary_large_image">
    <script>
/**
 * Enhanced Website Analytics Tracking
 * Replaces dasTrack() stubs with real Google Analytics 4 + Search Console integration
 * 
 * Features:
 * - GA4 event tracking with custom parameters
 * - SEO/AEO/GEO-specific event tracking
 * - Cross-platform attribution (web to app)
 * - Answer box appearance detection
 * - Conversion funnel tracking
 * - Geographic performance tracking
 */

(function() {
    'use strict';

    // Configuration
    const CONFIG = {
        GA4_MEASUREMENT_ID: 'G-KKKX3H7LLW', // Replace with your GA4 Measurement ID
        DEBUG: window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1',
        SESSION_TIMEOUT: 30 * 60 * 1000, // 30 minutes
        
        // Target keywords for AEO tracking
        TARGET_KEYWORDS: [
            'how to find negative margin orders shopify',
            'shopify margin leak calculator',
            'shopify product seo audit',
            'shopify missing alt text',
            'figma prototype to mp4',
            'convert photo format iphone',
            'scan receipts iphone',
            'verify ai generated citations',
            'linear issue spec checker'
        ],
        
        // Product mapping for attribution
        PRODUCT_MAPPING: {
            '/how-to-find-negative-margin-orders-shopify/': 'profitpulse-ai',
            '/shopify-margin-leak-calculator/': 'profitpulse-ai',
            '/shopify-product-seo-audit/': 'bulkgenie-ai', 
            '/shopify-missing-alt-text-checker/': 'bulkgenie-ai',
            '/figma-prototype-to-mp4/': 'protovid',
            '/convert-photo-format-iphone/': 'photo-converter-ios',
            '/scan-receipts-iphone/': 'receipt-scanner-ios',
            '/verify-ai-generated-citations/': 'citeclear',
            '/linear-issue-spec-checker/': 'specbot'
        }
    };

    // Initialize Google Analytics 4
    function initializeGA4() {
        if (typeof gtag === 'undefined') {
            // Load GA4 if not already present
            const script = document.createElement('script');
            script.async = true;
            script.src = `https://www.googletagmanager.com/gtag/js?id=${CONFIG.GA4_MEASUREMENT_ID}`;
            document.head.appendChild(script);
            
            script.onload = function() {
                window.dataLayer = window.dataLayer || [];
                window.gtag = function() { dataLayer.push(arguments); }
                
                gtag('js', new Date());
                gtag('config', CONFIG.GA4_MEASUREMENT_ID, {
                    send_page_view: false, // We'll send manually with custom parameters
                    anonymize_ip: true,
                    allow_google_signals: true,
                    allow_ad_personalization_signals: false
                });
                
                // Send initial page view with SEO context
                sendPageView();
            };
        } else {
            // GA4 already loaded, send initial page view
            sendPageView();
        }
    }

    // Session and user tracking
    let sessionId = getOrCreateSessionId();
    let userId = getOrCreateUserId();

    function getOrCreateSessionId() {
        let sessionId = sessionStorage.getItem('das_session_id');
        const sessionTimestamp = sessionStorage.getItem('das_session_timestamp');
        const now = Date.now();
        
        if (!sessionId || !sessionTimestamp || (now - parseInt(sessionTimestamp)) > CONFIG.SESSION_TIMEOUT) {
            sessionId = 'das_' + now.toString(36) + '_' + Math.random().toString(36).substr(2, 9);
            sessionStorage.setItem('das_session_id', sessionId);
        }
        
        sessionStorage.setItem('das_session_timestamp', now.toString());
        return sessionId;
    }

    function getOrCreateUserId() {
        let userId = localStorage.getItem('das_user_id');
        if (!userId) {
            userId = 'user_' + Date.now().toString(36) + '_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('das_user_id', userId);
        }
        return userId;
    }

    // Get referral and campaign information
    function getAttributionData() {
        const urlParams = new URLSearchParams(window.location.search);
        
        return {
            utm_source: urlParams.get('utm_source') || document.referrer || null,
            utm_medium: urlParams.get('utm_medium') || 'organic',
            utm_campaign: urlParams.get('utm_campaign') || null,
            utm_term: urlParams.get('utm_term') || null,
            utm_content: urlParams.get('utm_content') || null,
            referrer: document.referrer || null,
            referrer_domain: document.referrer ? new URL(document.referrer).hostname : null
        };
    }

    // Detect if page appeared in answer box (check referrer patterns and query params)
    function detectAnswerBoxAppearance() {
        const attribution = getAttributionData();
        const queryParams = new URLSearchParams(window.location.search);
        
        // Check for Google SERP referrer patterns that might indicate answer box
        if (attribution.referrer_domain && attribution.referrer_domain.includes('google')) {
            const referrerUrl = new URL(document.referrer);
            const query = referrerUrl.searchParams.get('q');
            
            // Check if the query matches our target keywords
            if (query) {
                for (const keyword of CONFIG.TARGET_KEYWORDS) {
                    if (query.toLowerCase().includes(keyword.toLowerCase()) || 
                        keyword.toLowerCase().includes(query.toLowerCase())) {
                        return {
                            detected: true,
                            query: query,
                            keyword_match: keyword,
                            referrer: document.referrer
                        };
                    }
                }
            }
        }
        
        return { detected: false };
    }

    // Get page context and product mapping
    function getPageContext() {
        const path = window.location.pathname;
        const product = CONFIG.PRODUCT_MAPPING[path] || 'unknown';
        
        return {
            page_path: path,
            page_title: document.title,
            page_product: product,
            page_category: getPageCategory(path),
            canonical_url: getCanonicalUrl()
        };
    }

    function getPageCategory(path) {
        if (path.includes('shopify')) return 'shopify-tools';
        if (path.includes('figma')) return 'design-tools';
        if (path.includes('iphone') || path.includes('ios')) return 'ios-apps';
        if (path.includes('citation') || path.includes('legal')) return 'legal-tools';
        if (path.includes('linear')) return 'dev-tools';
        return 'general';
    }

    function getCanonicalUrl() {
        const canonical = document.querySelector('link[rel="canonical"]');
        return canonical ? canonical.href : window.location.href;
    }

    // Enhanced tracking function that replaces dasTrack()
    function enhancedTrack(eventName, eventParams = {}) {
        if (CONFIG.DEBUG) {
            console.log('[Enhanced Analytics]', eventName, eventParams);
        }

        const attribution = getAttributionData();
        const pageContext = getPageContext();
        const answerBox = detectAnswerBoxAppearance();
        
        // Prepare GA4 event parameters
        const ga4Params = {
            // Custom parameters
            session_id: sessionId,
            user_id: userId,
            page_product: pageContext.page_product,
            page_category: pageContext.page_category,
            
            // Attribution
            traffic_source: attribution.utm_source,
            traffic_medium: attribution.utm_medium,
            traffic_campaign: attribution.utm_campaign,
            
            // SEO/AEO specific
            answer_box_detected: answerBox.detected,
            search_query: answerBox.query || null,
            keyword_match: answerBox.keyword_match || null,
            
            // Geographic (will be auto-detected by GA4)
            ...eventParams
        };

        // Send to GA4
        if (typeof gtag !== 'undefined') {
            gtag('event', eventName, ga4Params);
        }

        // Send to custom endpoint if available (for additional processing)
        sendToCustomEndpoint(eventName, ga4Params);
    }

    // Send enhanced page view with SEO context
    function sendPageView() {
        const pageContext = getPageContext();
        const answerBox = detectAnswerBoxAppearance();
        
        enhancedTrack('seo_page_view', {
            page_title: pageContext.page_title,
            page_location: window.location.href,
            content_group1: pageContext.page_category,
            content_group2: pageContext.page_product,
            custom_parameter_1: answerBox.detected ? 'answer_box_entry' : 'organic_entry'
        });

        // If answer box detected, send specific event
        if (answerBox.detected) {
            enhancedTrack('answer_box_appearance', {
                search_query: answerBox.query,
                keyword_match: answerBox.keyword_match,
                page_product: pageContext.page_product
            });
        }
    }

    // Intersection Observer for viewport tracking
    function trackElementVisibility(selector, eventName, additionalParams = {}) {
        const elements = document.querySelectorAll(selector);
        if (!elements.length || !('IntersectionObserver' in window)) return;

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const elementId = entry.target.id || entry.target.className || 'unknown';
                    enhancedTrack(eventName, {
                        element_id: elementId,
                        visibility_percentage: Math.round(entry.intersectionRatio * 100),
                        ...additionalParams
                    });
                    observer.unobserve(entry.target); // Track only once
                }
            });
        }, { threshold: 0.5 });

        elements.forEach(el => observer.observe(el));
    }

    // Track scroll depth
    function trackScrollDepth() {
        let maxScroll = 0;
        const milestones = [25, 50, 75, 90, 100];
        const tracked = new Set();

        function handleScroll() {
            const scrollPercent = Math.round(
                (window.scrollY + window.innerHeight) / document.body.scrollHeight * 100
            );
            
            if (scrollPercent > maxScroll) {
                maxScroll = scrollPercent;
                
                milestones.forEach(milestone => {
                    if (scrollPercent >= milestone && !tracked.has(milestone)) {
                        tracked.add(milestone);
                        enhancedTrack('scroll_depth', {
                            scroll_percentage: milestone,
                            page_product: getPageContext().page_product
                        });
                    }
                });
            }
        }

        window.addEventListener('scroll', handleScroll, { passive: true });
    }

    // Send to custom analytics endpoint for additional processing
    function sendToCustomEndpoint(eventName, params) {
        // Optional: Send to your own analytics endpoint for cross-referencing with app data
        if (window.location.hostname !== 'localhost') {
            try {
                fetch('/api/analytics', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        event: eventName,
                        params: params,
                        timestamp: new Date().toISOString(),
                        user_agent: navigator.userAgent,
                        screen_resolution: `${screen.width}x${screen.height}`
                    })
                }).catch(err => {
                    if (CONFIG.DEBUG) console.log('Custom endpoint error:', err);
                });
            } catch (e) {
                // Fail silently
            }
        }
    }

    // Replace the existing dasTrack function globally
    window.dasTrack = enhancedTrack;

    // Initialize enhanced tracking
    function initialize() {
        // Initialize GA4
        initializeGA4();
        
        // Set up automatic tracking
        trackScrollDepth();
        
        // Track sample output views
        trackElementVisibility('.sample-output, .example-table', 'sample_output_view');
        
        // Track CTA visibility
        trackElementVisibility('[data-track="product_cta_click"]', 'cta_visibility');
        
        // Enhanced click tracking
        document.addEventListener('click', function(event) {
            const element = event.target.closest('[data-track]');
            if (element) {
                const trackingEvent = element.getAttribute('data-track');
                const productUrl = element.href || element.getAttribute('data-url');
                
                enhancedTrack(trackingEvent, {
                    click_text: element.textContent.trim(),
                    click_url: productUrl,
                    element_type: element.tagName.toLowerCase(),
                    page_product: getPageContext().page_product
                });
                
                // For app store clicks, track as conversion
                if (trackingEvent === 'app_store_click' || productUrl?.includes('apps.apple.com')) {
                    enhancedTrack('organic_conversion', {
                        conversion_type: 'app_store_click',
                        target_app: getPageContext().page_product
                    });
                }
            }
        });

        // Track exit intent
        let exitIntentShown = false;
        document.addEventListener('mouseleave', function(event) {
            if (!exitIntentShown && event.clientY <= 0) {
                exitIntentShown = true;
                enhancedTrack('exit_intent', {
                    time_on_page: Date.now() - performance.timeOrigin,
                    scroll_depth: maxScroll || 0
                });
            }
        });
    }

    // Initialize when DOM is ready
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initialize);
    } else {
        initialize();
    }

    // Export for manual use
    window.EnhancedAnalytics = {
        track: enhancedTrack,
        trackPageView: sendPageView,
        trackVisibility: trackElementVisibility,
        getSessionId: () => sessionId,
        getUserId: () => userId,
        getPageContext: getPageContext,
        detectAnswerBox: detectAnswerBoxAppearance
    };

})();
</script>
</body>
</html>
